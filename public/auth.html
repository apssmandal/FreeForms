<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — FreeForms</title>
  <meta name="description" content="Sign in to FreeForms to manage your form endpoints and submissions." />
  <link rel="stylesheet" href="/css/auth.css?v=2" />

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>

<div class="auth-bg"></div>

<div class="auth-card">
  <!-- Logo -->
  <a href="/" class="auth-logo">
    <div class="logo-icon">FF</div>
    <span>FreeForms</span>
  </a>

  <!-- Tabs -->
  <div class="auth-tabs">
    <button class="auth-tab active" data-tab="login"    id="tab-login">Sign In</button>
    <button class="auth-tab"        data-tab="register" id="tab-register">Create Account</button>
  </div>

  <!-- Login Panel -->
  <div class="auth-panel active" id="panel-login">
    <div class="auth-error" id="login-error"></div>

    <button class="btn-google" id="google-login-btn" type="button">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="auth-divider">or sign in with email</div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="login-email">Email</label>
        <input class="form-input" type="email" id="login-email" name="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="login-pass">Password</label>
        <input class="form-input" type="password" id="login-pass" name="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-auth" id="login-btn">
        <span class="btn-text">Sign In</span>
        <span class="btn-spinner" style="display:none">
          <span style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle"></span>
        </span>
      </button>
    </form>
  </div>

  <!-- Register Panel -->
  <div class="auth-panel" id="panel-register">
    <div class="auth-error" id="register-error"></div>

    <button class="btn-google" id="google-register-btn" type="button">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="auth-divider">or create with email</div>

    <form id="register-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="register-email">Email</label>
        <input class="form-input" type="email" id="register-email" name="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="register-pass">Password</label>
        <input class="form-input" type="password" id="register-pass" name="password" placeholder="Min. 8 characters" required autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label class="form-label" for="register-confirm">Confirm Password</label>
        <input class="form-input" type="password" id="register-confirm" name="confirm" placeholder="Repeat password" required autocomplete="new-password" />
      </div>
      <button type="submit" class="btn-auth" id="register-btn">
        <span class="btn-text">Create Account</span>
        <span class="btn-spinner" style="display:none">
          <span style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle"></span>
        </span>
      </button>
    </form>
  </div>

  <p class="auth-footer">
    By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
  </p>
</div>

<style>
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

<script type="module" src="/js/auth.js?v=2"></script>
</body>
</html>
